# The `zfs` userspace dependency chain pulls in `pcp`, which seeds these
# directories under `/var` during image composition. Declaring them here keeps
# `bootc container lint` aligned with the final filesystem layout.
d /var/lib/pcp 0755 root root - -
d /var/lib/pcp/config 0755 root root - -
d /var/lib/pcp/config/derived 0755 root root - -
