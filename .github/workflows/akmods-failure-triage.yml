name: Akmods Failure Triage

# This workflow runs AFTER the main build workflow completes and manages a
# small number of sticky GitHub issues that reflect persistent upstream
# incompatibilities. The build workflow itself still fails loudly — this
# workflow only adds visibility on top of red builds. On a green build it
# auto-closes all open akmods-failure sticky issues so transient failures do not
# stay pinned.
#
# It also keeps a small JSON file on the `status` branch in sync with the same
# state, so the README's OpenZFS/kernel badge can show *why* a build is
# blocked (not just that it is) without a reader having to open an issue.

on:
  workflow_run:
    workflows: ["Build And Promote Main Image"]
    types:
      - completed

concurrency:
  group: akmods-failure-triage
  cancel-in-progress: true

jobs:
  triage:
    name: Manage sticky akmods failure issue
    runs-on: ubuntu-24.04
    if: github.event.workflow_run.event != 'pull_request'
    permissions:
      contents: write
      issues: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Pull down the failure payload artifact (if the build job uploaded one)
      # without using the moving `actions/download-artifact` default branch.
      - name: Download failure payload if present
        id: download
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const artifactsResp = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
            const artifacts = artifactsResp.data.artifacts;

            // A build-inputs-<run_id> artifact is uploaded only after the build
            // job resolves inputs, so its presence means a real build ran. A
            // scheduled run that the stable-signal gate skipped produces no such
            // artifact yet still reports the run conclusion as "success". The
            // auto-close step below gates on this so a skipped run cannot close
            // sticky issues that track a still-unfixed failure.
            core.setOutput('build_ran', artifacts.some(a => a.name.startsWith('build-inputs-')) ? 'true' : 'false');

            const prefix = 'akmods-failure-';
            const artifact = artifacts.find(a => a.name.startsWith(prefix));
            if (!artifact) {
              core.setOutput('has_payload', 'false');
              return;
            }
            const zip = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
              archive_format: 'zip',
            });
            fs.mkdirSync('artifacts', { recursive: true });
            fs.writeFileSync('artifacts/akmods-failure.zip', Buffer.from(zip.data));
            core.setOutput('has_payload', 'true');

      - name: Unzip payload
        if: steps.download.outputs.has_payload == 'true'
        shell: bash
        run: |
          cd artifacts
          unzip -o akmods-failure.zip
          ls -la

      - name: Open or update sticky issue on failed run
        if: github.event.workflow_run.conclusion == 'failure' && steps.download.outputs.has_payload == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const payload = JSON.parse(fs.readFileSync('artifacts/akmods-failure.json', 'utf8'));
            const stickyLabel = 'akmods-failure';
            const keyMarker = `<!-- akmods-failure-key: ${payload.key} -->`;
            const body = `${keyMarker}\n\n${payload.body}`;

            // Ensure the sticky label exists before trying to use it.
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: stickyLabel,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: stickyLabel,
                  color: 'd93f0b',
                  description: 'Sticky issue tracking a persistent akmods build failure',
                });
                core.info(`Created label "${stickyLabel}"`);
              } else {
                throw e;
              }
            }

            // Look for an existing open issue with the same sticky key marker.
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: stickyLabel,
              per_page: 100,
            });
            const match = existing.find(i => (i.body || '').includes(keyMarker));
            if (match) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: body,
              });
              core.info(`Updated sticky issue #${match.number} for key ${payload.key}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: payload.title,
                body: body,
                labels: [stickyLabel],
              });
              core.info(`Opened sticky issue #${created.data.number} for key ${payload.key}`);
            }

      - name: Close stale sticky issues on successful run
        if: github.event.workflow_run.conclusion == 'success' && steps.download.outputs.build_ran == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const stickyLabel = 'akmods-failure';
            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: stickyLabel,
              per_page: 100,
            });
            for (const issue of open) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Build workflow succeeded on ${context.payload.workflow_run.head_sha}. Auto-closing sticky issue.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              core.info(`Closed sticky issue #${issue.number}`);
            }

      # Only two conclusions tell us anything new about OpenZFS/kernel compat:
      # a classified upstream-compat failure (has_payload is only 'true' when
      # the akmods build step actually ran and failed) or a clean success. Any
      # other conclusion leaves the previous badge state untouched.
      - name: Build OpenZFS/kernel badge payload
        id: badge
        if: steps.download.outputs.has_payload == 'true' || github.event.workflow_run.conclusion == 'success'
        shell: bash
        env:
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          FAILURE_PAYLOAD_PATH: artifacts/akmods-failure.json
          BADGE_OUTPUT_PATH: artifacts/akmods-badge.json
        run: |
          python3 -m ci_tools.cli write-akmods-badge

      # Publish the badge JSON to a dedicated `status` branch (not `main`) so
      # this bot commit never touches the branch that produces signed images.
      # shields.io's dynamic/endpoint badge reads this file straight off
      # raw.githubusercontent.com.
      - name: Publish badge to status branch
        if: steps.badge.outputs.updated == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          work_dir="$(mktemp -d)"
          cd "$work_dir"
          git init -q
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          if git fetch --depth 1 origin status 2>/dev/null; then
            git checkout -q FETCH_HEAD -b status
          else
            git checkout -q --orphan status
          fi
          git rm -rf . >/dev/null 2>&1 || true
          cp "$GITHUB_WORKSPACE/artifacts/akmods-badge.json" akmods-badge.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add akmods-badge.json
          if git diff --cached --quiet; then
            echo "Badge content unchanged; nothing to commit."
          else
            git commit -q -m "Update OpenZFS/kernel status badge"
            git push origin HEAD:status
          fi
