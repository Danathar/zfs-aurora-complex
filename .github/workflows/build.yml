name: Build And Promote Main Image

# This is the production workflow. It resolves the current Fedora base image,
# ensures there is a matching ZFS module build for the primary kernel we
# support, builds a candidate image, and only then promotes that tested image
# to the stable `latest` tag.
on:
  schedule:
    # GitHub cron expressions use Coordinated Universal Time (UTC). `00 06`
    # means 06:00 UTC each day, which is 01:00 in New York during standard
    # time and 02:00 during daylight saving time.
    - cron: "00 06 * * *"

  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - "**/README.md"
      - docs/**
      - "**/*.md"

  workflow_dispatch:
    # `workflow_dispatch` is GitHub's name for a manual run started from the
    # web interface or the `gh` command-line tool.
    inputs:
      rebuild_akmods:
        description: Force rebuild of shared self-hosted ZFS akmods
        required: false
        default: false
        type: boolean
      promote_to_stable:
        description: Promote the tested candidate tag to latest after success
        required: false
        default: true
        type: boolean
      use_input_lock:
        description: Use lock file inputs instead of moving latest tags
        required: false
        default: false
        type: boolean
      lock_file:
        description: Lock file path for replay mode
        required: false
        default: ci/inputs.lock.json
        type: string
      build_container_image:
        description: Build container image/ref override for the akmods job
        required: false
        default: ""
        type: string

concurrency:
  # Never let two `main` runs race to publish images. If a newer run starts, the
  # older one is cancelled before it can publish something based on older input.
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Evaluate Stable Signal Gate
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.gate.outputs.should_build }}
      reason: ${{ steps.gate.outputs.reason }}
      stable_signal_ref: ${{ steps.gate.outputs.stable_signal_ref }}
      stable_signal_digest: ${{ steps.gate.outputs.stable_signal_digest }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install skopeo and cosign
        uses: ./.github/actions/install-signing-tools

      - name: Evaluate stable signal gate
        id: gate
        shell: bash
        env:
          REGISTRY_ACTOR: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ github.token }}
        run: |
          python3 -m ci_tools.cli check-stable-signal

  build-zfs-akmods:
    name: Build Shared ZFS Akmods Cache
    needs: preflight
    if: github.event_name != 'schedule' || needs.preflight.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    outputs:
      fedora_version: ${{ steps.prepare.outputs.version }}
      kernel_release: ${{ steps.prepare.outputs.kernel_release }}
      detected_kernel_releases: ${{ steps.prepare.outputs.detected_kernel_releases }}
      base_image_ref: ${{ steps.prepare.outputs.base_image_ref }}
      base_image_name: ${{ steps.prepare.outputs.base_image_name }}
      base_image_tag: ${{ steps.prepare.outputs.base_image_tag }}
      base_image_pinned: ${{ steps.prepare.outputs.base_image_pinned }}
      base_image_digest: ${{ steps.prepare.outputs.base_image_digest }}
      build_container_ref: ${{ steps.prepare.outputs.build_container_ref }}
      build_container_pinned: ${{ steps.prepare.outputs.build_container_pinned }}
      build_container_digest: ${{ steps.prepare.outputs.build_container_digest }}
      zfs_minor_version: ${{ steps.prepare.outputs.zfs_minor_version }}
      akmods_upstream_ref: ${{ steps.prepare.outputs.akmods_upstream_ref }}
      use_input_lock: ${{ steps.prepare.outputs.use_input_lock }}
      lock_file_path: ${{ steps.prepare.outputs.lock_file_path }}
      akmods_cache_exists: ${{ steps.prepare.outputs.akmods_cache_exists }}
      akmods_image: ${{ steps.prepare.outputs.akmods_image }}
      akmods_image_pinned: ${{ steps.prepare.outputs.akmods_image_pinned }}
    permissions:
      contents: read
      packages: write
    container:
      # The akmods job runs inside a privileged build container because it needs
      # the kernel-module build tooling and container storage access expected by
      # the upstream akmods workflow we are reusing.
      # This fallback must match DEFAULT_BUILD_CONTAINER_IMAGE in ci/defaults.json;
      # a job's `container:` block cannot read step outputs, so it cannot read the
      # checked-in default and this literal must be kept in sync manually.
      image: ${{ github.event.inputs.build_container_image || 'ghcr.io/ublue-os/devcontainer:latest' }}
      options: "--privileged --volume /:/host-sys --volume /var/lib/containers:/var/lib/containers --security-opt seccomp=unconfined --security-opt label=disable --user 0:0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Load the repository defaults, including akmods source-selection settings
      # and the default floating base-image reference.
      - id: defaults
        name: Load repository defaults
        uses: ./.github/actions/load-ci-defaults

      # This action handles the preparation work that would otherwise dominate
      # the workflow file: resolve moving inputs, save a manifest artifact,
      # verify the current shared cache, and rebuild that cache only when needed.
      - name: Resolve inputs, verify cache state, and refresh shared akmods when required
        id: prepare
        uses: ./.github/actions/prepare-main-akmods
        with:
          use_input_lock: ${{ github.event.inputs.use_input_lock || 'false' }}
          lock_file: ${{ github.event.inputs.lock_file || 'ci/inputs.lock.json' }}
          build_container_ref: ${{ github.event.inputs.build_container_image || steps.defaults.outputs.default_build_container_image }}
          akmods_repo: ${{ steps.defaults.outputs.akmods_repo }}
          akmods_upstream_repo: ${{ steps.defaults.outputs.akmods_upstream_repo }}
          rebuild_akmods: ${{ github.event_name == 'schedule' || github.event.inputs.rebuild_akmods == 'true' }}
          registry_actor: ${{ github.actor }}
          registry_token: ${{ github.token }}

  build-candidate-image:
    name: Build Candidate Image
    needs:
      - preflight
      - build-zfs-akmods
    if: github.event_name != 'schedule' || needs.preflight.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    env:
      HAS_SIGNING_SECRET: ${{ secrets.SIGNING_SECRET != '' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Rechunking briefly needs two copies of the image unpacked at once, so
      # prepare disk space, podman version, and storage layout before the
      # build starts.
      - name: Prepare runner for Chunkah rechunking
        uses: ./.github/actions/prepare-rechunk-host

      # Re-load defaults here because each GitHub job runs on a fresh runner.
      - id: defaults
        name: Load repository defaults
        uses: ./.github/actions/load-ci-defaults

      # The registry context step normalizes the owner name so every later GHCR
      # reference uses one consistent, lowercase path.
      - id: registry
        name: Prepare registry context
        uses: ./.github/actions/prepare-registry-context

      - name: Require signing secret for production image publication
        if: env.HAS_SIGNING_SECRET != 'true'
        shell: bash
        run: |
          echo "SIGNING_SECRET is not configured. Refusing to publish an unsigned production image because booted systems enforce cosign signature verification for this repository." >&2
          exit 1

      # The candidate tag is the image that gets tested first. Promotion happens
      # later by copying this already-built image to `latest` only after success.
      - name: Compute candidate tag
        id: tags
        shell: bash
        env:
          FEDORA_VERSION: ${{ needs.build-zfs-akmods.outputs.fedora_version }}
        run: |
          python3 -m ci_tools.cli compute-candidate-tag

      # Build the candidate image against the exact base-image digest and the
      # shared akmods cache chosen in the previous job.
      - name: Build candidate image locally
        uses: ./.github/actions/build-native-image
        with:
          image_name: ${{ steps.defaults.outputs.image_name }}
          image_tag: ${{ steps.tags.outputs.candidate_tag }}
          base_image: ${{ needs.build-zfs-akmods.outputs.base_image_pinned }}
          akmods_image: ${{ needs.build-zfs-akmods.outputs.akmods_image_pinned }}
          akmods_upstream_ref: ${{ needs.build-zfs-akmods.outputs.akmods_upstream_ref }}
          stable_signal_image: ${{ needs.preflight.outputs.stable_signal_ref }}
          stable_signal_digest: ${{ needs.preflight.outputs.stable_signal_digest }}
          image_repo: ghcr.io/${{ steps.registry.outputs.image_org }}/${{ steps.defaults.outputs.image_name }}
          signing_key_filename: ${{ steps.defaults.outputs.image_name }}.pub

      # Re-layer the built image into content-addressed chunks before it is
      # published. This only changes how the image is split into layers, not
      # which files it contains.
      - name: Rechunk candidate image with Chunkah
        uses: ./.github/actions/rechunk-native-image
        with:
          image_name: ${{ steps.defaults.outputs.image_name }}
          image_tag: ${{ steps.tags.outputs.candidate_tag }}

      # Candidate publication is separate from promotion. This lets the workflow
      # test and sign the candidate first, then decide later whether it is safe
      # to copy that exact digest to the stable tag.
      - name: Push and sign candidate image
        uses: ./.github/actions/publish-native-image
        with:
          image_registry: ${{ steps.registry.outputs.image_registry }}
          image_name: ${{ steps.defaults.outputs.image_name }}
          image_tag: ${{ steps.tags.outputs.candidate_tag }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ github.token }}
          image_org: ${{ steps.registry.outputs.image_org }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}

  promote-stable:
    name: Promote Candidate To Stable
    needs:
      - build-zfs-akmods
      - build-candidate-image
    # Manual runs can opt out of promotion so a maintainer can build and inspect
    # the candidate image without moving the public `latest` tag.
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.promote_to_stable == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Each job starts on a fresh runner, so we load defaults and registry
      # context again instead of depending on process-local state from earlier
      # jobs.
      - id: defaults
        name: Load repository defaults
        uses: ./.github/actions/load-ci-defaults

      - id: registry
        name: Prepare registry context
        uses: ./.github/actions/prepare-registry-context

      # Promotion and signing need `skopeo` and `cosign`, but the earlier build
      # jobs do not. Installing them only here keeps the other jobs lighter.
      - name: Install skopeo and cosign
        uses: ./.github/actions/install-signing-tools

      # Promotion copies the already-tested candidate image digest to `latest`
      # and records audit tags. The candidate signature carries over because
      # both tags resolve to the same digest.
      - name: Promote candidate image to latest and audit tags
        shell: bash
        env:
          REGISTRY_ACTOR: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ github.token }}
          FEDORA_VERSION: ${{ needs.build-zfs-akmods.outputs.fedora_version }}
          IMAGE_NAME: ${{ steps.defaults.outputs.image_name }}
        run: |
          python3 -m ci_tools.cli promote-stable
