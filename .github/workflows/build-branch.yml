name: Build Branch Image

# This workflow validates normal development branches. It proves that the branch
# can still resolve inputs, reuse or build the shared ZFS module cache, and
# compose a working image before anything lands on `main`.
on:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - README.md
      - "**/README.md"
      - docs/**
      - "**/*.md"
  workflow_dispatch:
    inputs:
      build_container_image:
        description: Build container image override for the akmods job (leave empty for default)
        required: false
        default: ""
        type: string

concurrency:
  # Only keep the newest run for a branch. If several commits land quickly, the
  # older run is no longer interesting and should not keep consuming time.
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  prepare-branch-metadata:
    name: Compute Branch Tag
    runs-on: ubuntu-24.04
    outputs:
      branch_tag: ${{ steps.branch.outputs.branch_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # Branch names can contain slashes and other characters that do not make
      # good image tags. This step turns the Git branch name into a safe prefix
      # that can be used in the registry.
      - name: Compute branch-safe image tag prefix
        id: branch
        shell: bash
        run: |
          python3 -m ci_tools.cli compute-branch-metadata

  build-branch-akmods:
    name: Build Or Reuse Shared ZFS Akmods Cache
    runs-on: ubuntu-24.04
    outputs:
      fedora_version: ${{ steps.prepare.outputs.version }}
      kernel_release: ${{ steps.prepare.outputs.kernel_release }}
      detected_kernel_releases: ${{ steps.prepare.outputs.detected_kernel_releases }}
      base_image_ref: ${{ steps.prepare.outputs.base_image_ref }}
      base_image_name: ${{ steps.prepare.outputs.base_image_name }}
      base_image_tag: ${{ steps.prepare.outputs.base_image_tag }}
      base_image_pinned: ${{ steps.prepare.outputs.base_image_pinned }}
      base_image_digest: ${{ steps.prepare.outputs.base_image_digest }}
      build_container_ref: ${{ steps.prepare.outputs.build_container_ref }}
      build_container_pinned: ${{ steps.prepare.outputs.build_container_pinned }}
      build_container_digest: ${{ steps.prepare.outputs.build_container_digest }}
      zfs_minor_version: ${{ steps.prepare.outputs.zfs_minor_version }}
      akmods_upstream_ref: ${{ steps.prepare.outputs.akmods_upstream_ref }}
      use_input_lock: ${{ steps.prepare.outputs.use_input_lock }}
      lock_file_path: ${{ steps.prepare.outputs.lock_file_path }}
      akmods_cache_exists: ${{ steps.prepare.outputs.akmods_cache_exists }}
    permissions:
      contents: read
      packages: write
    container:
      # Reuse the same privileged akmods-build environment as the main
      # workflow. The upstream akmods tooling depends on `just`, container
      # storage access, and the build packages included in this image.
      image: ${{ github.event.inputs.build_container_image || 'ghcr.io/ublue-os/devcontainer:latest' }}
      options: "--privileged --volume /:/host-sys --volume /var/lib/containers:/var/lib/containers --security-opt seccomp=unconfined --security-opt label=disable --user 0:0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - id: defaults
        name: Load repository defaults
        uses: ./.github/actions/load-ci-defaults

      # Branch builds should reuse the shared Aurora cache when possible, but
      # they also need to be able to seed that cache the first time a new base
      # kernel stream appears on the branch.
      - name: Resolve inputs, verify cache state, and refresh shared akmods when required
        id: prepare
        uses: ./.github/actions/prepare-main-akmods
        with:
          use_input_lock: "false"
          lock_file: ci/inputs.lock.json
          build_container_ref: ${{ steps.defaults.outputs.default_build_container_image }}
          akmods_repo: ${{ steps.defaults.outputs.akmods_repo }}
          akmods_upstream_repo: ${{ steps.defaults.outputs.akmods_upstream_repo }}
          rebuild_akmods: "false"
          registry_actor: ${{ github.actor }}
          registry_token: ${{ github.token }}

  build-branch-image:
    name: Build Branch Image
    needs:
      - prepare-branch-metadata
      - build-branch-akmods
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # Load the checked-in defaults first so the rest of the workflow can say
      # "use the repository default" without repeating long image references.
      - id: defaults
        name: Load repository defaults
        uses: ./.github/actions/load-ci-defaults

      # Compute the lowercase registry owner and whether the current actor is a
      # bot account. Branch builds for bot actors validate locally only.
      - id: registry
        name: Prepare registry context
        uses: ./.github/actions/prepare-registry-context

      # Add the resolved Fedora version to the branch tag so readers can tell
      # which base-image release the branch build targeted.
      - name: Compose final branch tag
        id: tags
        shell: bash
        env:
          BRANCH_TAG_PREFIX: ${{ needs.prepare-branch-metadata.outputs.branch_tag }}
          FEDORA_VERSION: ${{ needs.build-branch-akmods.outputs.fedora_version }}
        run: |
          python3 -m ci_tools.cli compose-branch-image-tag

      # Build the branch image locally first. This keeps the publication step
      # separate so validation can succeed without pushing anything.
      - name: Build branch image locally
        uses: ./.github/actions/build-native-image
        with:
          image_name: ${{ steps.defaults.outputs.image_name }}
          image_tag: ${{ steps.tags.outputs.branch_image_tag }}
          base_image: ${{ needs.build-branch-akmods.outputs.base_image_pinned }}
          brew_image: ${{ steps.defaults.outputs.default_brew_image }}
          akmods_image: ghcr.io/${{ steps.registry.outputs.image_org }}/${{ steps.defaults.outputs.akmods_repo }}:main-${{ needs.build-branch-akmods.outputs.fedora_version }}
          akmods_upstream_ref: ${{ needs.build-branch-akmods.outputs.akmods_upstream_ref }}
          image_repo: ghcr.io/${{ steps.registry.outputs.image_org }}/${{ steps.defaults.outputs.image_name }}
          signing_key_filename: ${{ steps.defaults.outputs.image_name }}.pub

      # Human-owned branches publish a signed test image so the branch can be
      # tried on a real machine if needed.
      - name: Push and sign branch image
        if: steps.registry.outputs.actor_is_bot != 'true'
        uses: ./.github/actions/publish-native-image
        with:
          image_registry: ${{ steps.registry.outputs.image_registry }}
          image_name: ${{ steps.defaults.outputs.image_name }}
          image_tag: ${{ steps.tags.outputs.branch_image_tag }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ github.token }}
          image_org: ${{ steps.registry.outputs.image_org }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}

      # Automated dependency update branches still run the full build, but they
      # stop short of publishing to avoid cluttering the registry with bot-only
      # tags that are not meant for human testing.
      - name: Explain skipped branch publish for bot actor
        if: steps.registry.outputs.actor_is_bot == 'true'
        shell: bash
        run: |
          echo "Actor ${GITHUB_ACTOR} is a bot account, so this workflow validated the branch image locally but did not push or sign it."
