name: Prepare Registry Context

description: Compute normalized GitHub Container Registry (GHCR) paths and whether the current account is an automation bot.

outputs:
  image_org:
    description: Lowercase image-owner portion used in GHCR paths.
    value: ${{ steps.context.outputs.image_org }}
  image_registry:
    description: Base GHCR registry path for the current owner.
    value: ${{ steps.context.outputs.image_registry }}
  actor_is_bot:
    description: Whether the current GitHub account is an automation bot account.
    value: ${{ steps.context.outputs.actor_is_bot }}

runs:
  using: composite
  steps:
    - id: context
      shell: bash
      run: |
        image_org=${GITHUB_REPOSITORY_OWNER,,}
        image_registry="ghcr.io/${image_org}"
        actor_is_bot=false
        if [[ "$GITHUB_ACTOR" == *"[bot]" ]]; then
          actor_is_bot=true
        fi

        echo "IMAGE_ORG=${image_org}" >> "$GITHUB_ENV"
        echo "IMAGE_REGISTRY=${image_registry}" >> "$GITHUB_ENV"
        echo "ACTOR_IS_BOT=${actor_is_bot}" >> "$GITHUB_ENV"

        echo "image_org=${image_org}" >> "$GITHUB_OUTPUT"
        echo "image_registry=${image_registry}" >> "$GITHUB_OUTPUT"
        echo "actor_is_bot=${actor_is_bot}" >> "$GITHUB_OUTPUT"
