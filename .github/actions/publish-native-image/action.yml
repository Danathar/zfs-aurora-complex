name: Publish Native Image

description: Push one locally built image tag to GitHub Container Registry (GHCR) and sign it.

inputs:
  image_registry:
    description: Registry path, for example ghcr.io/danathar.
    required: true
  image_name:
    description: Image name under the registry owner path.
    required: true
  image_tag:
    description: Image tag to push and sign.
    required: true
  registry_username:
    description: Registry username.
    required: true
  registry_password:
    description: Registry password or token.
    required: true
  image_org:
    description: Lowercase registry owner used for signing lookups.
    required: true
  cosign_private_key:
    description: Private signing key used to sign the pushed image digest.
    required: true

runs:
  # This action owns the publication sequence: authenticate, push a transient
  # tag, sign its digest, then promote that same digest to the requested tag.
  # That keeps user-facing tags from pointing at unsigned content.
  using: composite
  steps:
    - name: Require signing key before publication
      if: inputs.cosign_private_key == ''
      shell: bash
      run: |
        echo "SIGNING_SECRET is not configured. Refusing to publish an unsigned image." >&2
        exit 1

    # The `podman push` below authenticates with its own explicit --creds, but
    # the later `skopeo copy`/`skopeo inspect` calls in this file do not pass
    # credentials at all -- they rely on this login's Docker config file via
    # containers/image's fallback lookup. Authenticate here so those calls can
    # talk to GHCR as the current workflow actor.
    - uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4.5.1
      with:
        registry: ghcr.io
        username: ${{ inputs.registry_username }}
        password: ${{ inputs.registry_password }}

    - name: Retag local image for transient publication
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image_name }}
        IMAGE_TAG: ${{ inputs.image_tag }}
        TRANSIENT_IMAGE_TAG: ${{ inputs.image_tag }}-unsigned-${{ github.run_id }}
      run: |
        buildah tag "${IMAGE_NAME}:${IMAGE_TAG}" "${IMAGE_NAME}:${TRANSIENT_IMAGE_TAG}"

    # Push a non-publishable transient tag first. The requested tag is only
    # moved after cosign verifies the digest that will be promoted.
    #
    # Calls `podman push` directly rather than through a wrapper action:
    # redhat-actions/push-to-registry hasn't cut a release since March 2024
    # (though the repo itself is still active), and buildah/podman share the
    # same local container storage, so a plain `podman push` of the tag
    # buildah just built and the previous step retagged works the same way.
    # --creds is passed explicitly (matching what the wrapper action did for
    # this single-image, non-manifest case) rather than relying on the
    # `docker/login-action` credentials above; that login is still needed for
    # the later skopeo calls in this file, which read it via the containers/image
    # library's fallback to the Docker config file.
    - name: Push transient tag with podman
      shell: bash
      env:
        IMAGE_REGISTRY: ${{ inputs.image_registry }}
        IMAGE_NAME: ${{ inputs.image_name }}
        TRANSIENT_IMAGE_TAG: ${{ inputs.image_tag }}-unsigned-${{ github.run_id }}
        REGISTRY_USER: ${{ inputs.registry_username }}
        REGISTRY_PASSWORD: ${{ inputs.registry_password }}
      run: |
        set -euo pipefail
        podman push \
          --tls-verify=true \
          --creds "${REGISTRY_USER}:${REGISTRY_PASSWORD}" \
          "${IMAGE_NAME}:${TRANSIENT_IMAGE_TAG}" \
          "${IMAGE_REGISTRY}/${IMAGE_NAME}:${TRANSIENT_IMAGE_TAG}"

    # Install signing tools for the mandatory post-push signature.
    - uses: ./.github/actions/install-signing-tools

    # Sign the pushed image by digest, not by a mutable tag name. A tag such as
    # `latest` can move later, but a digest names one exact image forever.
    # Signing relies on the registry login performed above, not on separate
    # credentials passed into sign-image.
    - name: Sign transient image digest
      shell: bash
      env:
        IMAGE_ORG: ${{ inputs.image_org }}
        IMAGE_NAME: ${{ inputs.image_name }}
        IMAGE_TAG: ${{ inputs.image_tag }}-unsigned-${{ github.run_id }}
        COSIGN_PRIVATE_KEY: ${{ inputs.cosign_private_key }}
      run: |
        python3 -m ci_tools.cli sign-image

    - name: Promote signed digest to requested tag
      shell: bash
      env:
        IMAGE_REGISTRY: ${{ inputs.image_registry }}
        IMAGE_NAME: ${{ inputs.image_name }}
        IMAGE_TAG: ${{ inputs.image_tag }}
        TRANSIENT_IMAGE_TAG: ${{ inputs.image_tag }}-unsigned-${{ github.run_id }}
      run: |
        transient_ref="docker://${IMAGE_REGISTRY}/${IMAGE_NAME}:${TRANSIENT_IMAGE_TAG}"
        transient_digest="$(skopeo inspect --format '{{ .Digest }}' "${transient_ref}")"
        signed_ref="docker://${IMAGE_REGISTRY}/${IMAGE_NAME}@${transient_digest}"
        final_ref="docker://${IMAGE_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
        # --preserve-digests keeps this copy byte-identical rather than
        # letting skopeo re-encode the manifest; a re-encode would be
        # invisible here (the digest check below only compares tags this
        # same job pushed) but would silently drop Chunkah's layer
        # annotations, which is the entire point of rechunking.
        skopeo copy --multi-arch=all --preserve-digests "${signed_ref}" "${final_ref}"
        final_digest="$(skopeo inspect --format '{{ .Digest }}' "${final_ref}")"
        if [ "${final_digest}" != "${transient_digest}" ]; then
          echo "Promoted tag digest ${final_digest} does not match signed digest ${transient_digest}" >&2
          exit 1
        fi
