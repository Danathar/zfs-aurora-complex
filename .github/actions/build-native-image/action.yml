name: Build Native Image

description: Build the native Aurora image with the standard OCI build arguments used by this repository.

inputs:
  image_name:
    description: Local image name to hand to buildah.
    required: true
  image_tag:
    description: Local image tag to build.
    required: true
  base_image:
    description: Digest-pinned base image ref.
    required: true
  brew_image:
    description: Brew OCI image ref copied into the final image.
    required: true
  akmods_image:
    description: Shared akmods cache image ref.
    required: true
  akmods_upstream_ref:
    description: Resolved akmods fork commit SHA used for this build. Recorded as an OCI image label for provenance.
    required: false
    default: ""
  image_repo:
    description: Public image repository path used by in-image signing policy.
    required: true
  signing_key_filename:
    description: Public key filename installed inside the image.
    required: true

runs:
  # A "composite action" is a reusable set of workflow steps stored in this
  # repository. It lets the workflow say "build the image" once, without
  # copying the same Buildah settings into several workflow files.
  using: composite
  steps:
    # Buildah is the Open Container Initiative (OCI) image builder used by this
    # repository. We pass every build input explicitly so readers can see which
    # parts of the final image are chosen by the workflow.
    - uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056
      with:
        containerfiles: |
          ./Containerfile
        image: ${{ inputs.image_name }}
        tags: ${{ inputs.image_tag }}
        build-args: |
          BASE_IMAGE=${{ inputs.base_image }}
          BREW_IMAGE=${{ inputs.brew_image }}
          AKMODS_IMAGE=${{ inputs.akmods_image }}
          IMAGE_REPO=${{ inputs.image_repo }}
          SIGNING_KEY_FILENAME=${{ inputs.signing_key_filename }}
        # Record the resolved akmods source commit as an OCI image label so any
        # published image can be traced back to the exact upstream commit it was
        # built from, even when the tracking ref has since moved.
        labels: |
          org.zfs-aurora-complex.akmods-ref=${{ inputs.akmods_upstream_ref }}
          org.zfs-aurora-complex.akmods-image=${{ inputs.akmods_image }}
          org.zfs-aurora-complex.base-image=${{ inputs.base_image }}
        # Use Docker v2s2 manifest format instead of OCI image manifests.
        # `ostree container commit` and `rpm-ostree` work more reliably with the
        # Docker format. The "OCI" terminology elsewhere in this project refers to
        # OCI standards for registry interaction and layer handling, not the
        # specific container image manifest format produced by buildah.
        oci: false
